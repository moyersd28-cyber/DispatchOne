<!DOCTYPE html>
<html>
<head>
    <title>DispatchOne Admin</title>

    <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="admin-container">


<header class="admin-header">

    <h1>DispatchOne Administration</h1>

    <p id="departmentName">
        Loading Department...
    </p>

</header>



<section class="status-panel">

    <h2>System Status</h2>

    <div class="status-grid">

        <div class="status-box">
            <h3>Authentication</h3>
            <p class="online">
                ONLINE
            </p>
        </div>


        <div class="status-box">
            <h3>Database</h3>
            <p class="online">
                ONLINE
            </p>
        </div>


    </div>

</section>




<section class="overview-panel">

<h2>Department Overview</h2>


<div class="overview-grid">


<div class="stat-card">

<h3>Members</h3>

<span id="memberCount">
0
</span>

</div>



<div class="stat-card">

<h3>Apparatus</h3>

<span id="apparatusCount">
0
</span>

</div>




<div class="stat-card">

<h3>Dispatchers</h3>

<span id="dispatcherCount">
0
</span>

</div>


</div>


</section>





<section class="actions-panel">


<h2>Quick Actions</h2>


<div class="action-grid">


<button>
Create Member
</button>


<button>
Manage Apparatus
</button>


<button>
Department Settings
</button>


<button>
Activity Log
</button>


</div>


</section>




<button id="logout">
Logout
</button>


</div>



<script type="module" src="js/admin.js"></script>


</body>
</html>
