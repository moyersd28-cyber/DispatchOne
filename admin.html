<!DOCTYPE html>
<html>
<head>
    <title>DispatchOne Admin</title>

<link rel="icon" href="assets/favicon.ico">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="assets/icon-180.png">

<meta name="theme-color" content="#b91c1c">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="DispatchOne">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin.css">
    
</head>

<body>

<div class="admin-container">


<header class="admin-header">

    <h1>DispatchOne Administration</h1>

    <p id="departmentName">
        Loading Department...
    </p>

</header>



<section class="status-panel">

    <h2>System Status</h2>

    <div class="status-grid">

        <div class="status-box">
            <h3>Authentication</h3>
            <p class="online">
                ONLINE
            </p>
        </div>


        <div class="status-box">
            <h3>Database</h3>
            <p class="online">
                ONLINE
            </p>
        </div>


    </div>

</section>




<section class="overview-panel">

<h2>Department Overview</h2>


<div class="overview-grid">


<div class="stat-card">

<h3>Members</h3>

<span id="memberCount">
0
</span>

</div>



<div class="stat-card">

<h3>Apparatus</h3>

<span id="apparatusCount">
0
</span>

</div>




<div class="stat-card">

<h3>Dispatchers</h3>

<span id="dispatcherCount">
0
</span>

</div>


</div>


</section>





<section class="actions-panel">


<h2>Quick Actions</h2>


<div class="action-grid">


<button>
Create Member
</button>


<button>
Manage Apparatus
</button>


<button>
Department Settings
</button>


<button>
Activity Log
</button>


</div>


</section>
<section class="users-panel">

<h2>Department Members</h2>


<div class="create-user">

<h3>Create New Member</h3>


<input id="memberName" placeholder="Full Name">


<input id="memberEmail" placeholder="Email">


<select id="memberRole">

<option value="firefighter">
Firefighter
</option>


<option value="dispatcher">
Dispatcher
</option>


</select>


<button id="createMember">
Create Account
</button>


</div>



<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Role</th>

<th>Status</th>

</tr>

</thead>


<tbody id="memberTable">


</tbody>


</table>


</section>



<button id="logout">
Logout
</button>


</div>



<script type="module" src="js/admin.js"></script>


</body>
</html>
