<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>DispatchOne Firefighter</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="assets/favicon.ico">

<link rel="stylesheet"
href="css/main.css">

<link rel="stylesheet"
href="css/firefighter.css">

</head>

<body>

  <div id="alertSetup">

    <h3>
        Alert Tones
    </h3>

    <p>
        Enable dispatch tones on this device.
    </p>

    <button id="enableAlerts">
        Enable Alert Tones
    </button>

</div>
  
<div class="firefighter-container">

<header>

<h1>DispatchOne</h1>

<p id="departmentName">
Loading Department...
</p>

</header>



<section class="profile-card">

<h2 id="memberName">

Loading...

</h2>

<p id="memberRole">

Firefighter

</p>

</section>



<section class="status-card">

<h2>Status</h2>

<div id="statusBadge"
class="available">

AVAILABLE

</div>

<button id="toggleStatus">

Become Unavailable

</button>

</section>



<section id="incidentCard"
class="incident-card">

<h2>

Active Incident

</h2>

<div id="incidentContent">

No Active Incident

</div>

</section>



<button id="logout">

Logout

</button>

</div>

<script type="module"
src="js/firefighter.js"></script>

</body>

</html>
