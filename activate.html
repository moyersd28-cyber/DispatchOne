<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Account | DispatchOne</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-card">

<h1>Activate Your Account</h1>

<p>
Your department administrator has invited you to DispatchOne.
</p>

<input
id="email"
type="email"
placeholder="Email Address">

<input
id="password"
type="password"
placeholder="Choose Password">

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password">

<button id="activateButton">

Activate Account

</button>

<br><br>

<a href="index.html">

Back to Login

</a>

</div>

<script type="module" src="js/activate.js"></script>

</body>

</html>
